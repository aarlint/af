*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {

  --border: #2d2d32;
  --border-light: #3a3a40;
  --text: #e4e4e7;

  --text-muted: #71717a;
  --green-strong: #22c55e;
  --green: #4ade80;

  --red-strong: #ef4444;
  --red: #f87171;

  --yellow: #fbbf24;

  --mono: 'JetBrains Mono', monospace;
  --serif: 'Source Serif 4', Georgia, serif;
}

html { font-size: 16px; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--serif);
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ─── HEADER ─── */
.header {

  position: relative;
  overflow: hidden;
}

.header::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background:

}

.header h1 {

  font-weight: 800;
  font-size: clamp(2.5rem, 8vw, 5rem);
  letter-spacing: -0.03em;
  line-height: 1;
  color: var(--text);
  position: relative;
}

.header h1 .cursor {

  width: 3px;
  height: 0.8em;
  background: var(--red-strong);
  margin-left: 4px;

}

@keyframes blink {

}

.header .subtitle {

  font-style: italic;

}

/* ─── CONTAINER ─── */

}

.section-label {

  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 1.25rem;
}

.scoreboard {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 8px;
}

.country-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 1rem;
  cursor: pointer;
  transition: all 0.2s ease;
  position: relative;
  overflow: hidden;
}

.country-card:hover {
  background: var(--surface-hover);
  border-color: var(--border-light);

}

.country-card.active {

  background: var(--surface-hover);
}

.country-card .name {

  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 0.5rem;
}

.country-card .score {
  font-family: var(--mono);
  font-size: 1.75rem;
  font-weight: 800;
  line-height: 1;
}

.country-card .score.positive { color: var(--green); }
.country-card .score.negative { color: var(--red); }
.country-card .score.zero { color: var(--text-muted); }

.country-card .bar-track {
  margin-top: 0.75rem;
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  position: relative;
  overflow: hidden;
}

.country-card .bar-fill {
  position: absolute;
  top: 0;
  height: 100%;
  border-radius: 2px;
  transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}

.country-card .bar-fill.positive {
  left: 50%;
  background: var(--green);
}

.country-card .bar-fill.negative {
  right: 50%;
  background: var(--red);
}

.country-card .breakdown {
  margin-top: 0.5rem;
  font-family: var(--mono);
  font-size: 0.65rem;
  color: var(--text-muted);
}

/* ─── FILTERS ─── */
.filters {
  padding: 1.25rem 0;
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
  align-items: center;
  border-bottom: 1px solid var(--border);
}

.filter-btn {
  font-family: var(--mono);
  font-size: 0.7rem;
  font-weight: 400;
  letter-spacing: 0.02em;
  padding: 0.35rem 0.75rem;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 3px;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.15s ease;
}

.filter-btn:hover {
  border-color: var(--border-light);
  color: var(--text);
}

.filter-btn.active {
  background: var(--text);
  color: var(--bg);
  border-color: var(--text);
}

.filter-clear {
  font-family: var(--mono);
  font-size: 0.65rem;
  color: var(--text-muted);
  cursor: pointer;
  margin-left: auto;
  background: none;
  border: none;
  text-decoration: underline;
  text-underline-offset: 2px;
}

.filter-clear:hover { color: var(--text-dim); }

/* ─── ACTION LIST ─── */
.actions-section {
  padding: 1.5rem 0 4rem;
}

.action-count {

  font-size: 0.7rem;
  color: var(--text-muted);
  margin-bottom: 1rem;

.action-item {

}

.action-item:first-child {
  border-top: 1px solid var(--border);
}

.action-item:hover {
  background: rgba(255,255,255,0.01);

.action-header {

  padding: 1rem 0;

.action-left {}

.action-title {

.category-badge {

  font-size: 0.7rem;

  align-self: center;
}

/* ─── RESPONSIVE ─── */
@media (max-width: 640px) {
  .header { padding: 2rem 1rem 1.5rem; }
  .container { padding: 0 1rem; }

  .scoreboard {

  .country-card { padding: 0.75rem; }

  .action-header {
    grid-template-columns: 1fr;

  }

  .impact-dots { order: -1; }

  .impact-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

/* ─── STAGGER ANIMATIONS ─── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.country-card {

}

/* ─── FOOTER ─── */
.footer {
  padding: 2rem 0;
  border-top: 1px solid var(--border);
  text-align: center;
  font-family: var(--mono);
  font-size: 0.6rem;
  color: var(--text-muted);
}

.footer a { color: var(--text-dim); }
</style>

  if (v.includes("Positive")) return "positive";
  if (v.includes("Negative")) return "negative";
  if (v === "Mixed" || v.includes("Mixed")) return "mixed";
  return "neutral";
};

const CAT_CLASS = {
  "Multilateral Withdrawals": "cat-multilateral",
  "Foreign Aid": "cat-aid",
  "Diplomatic Policy": "cat-diplomatic",
  "Terrorist Designations": "cat-terrorist",
  "Tariffs as Leverage": "cat-tariffs",
  "Direct Support": "cat-direct",
  "Military Operations": "cat-military",
  "Security Policy": "cat-security"
};

// ── State ──
let activeCountry = null;
let activeCategory = null;

// ── Compute scores ──
function computeScores() {
  const scores = {};
  COUNTRIES.forEach(c => {
    let total = 0;
    let pos = 0, neg = 0;
    ACTIONS.forEach(a => {
      const v = a.impacts[c];
      const s = SCORE_MAP[v] || 0;
      total += s;
      if (s > 0) pos += s;
      if (s < 0) neg += Math.abs(s);
    });
    scores[c] = { total, pos, neg };
  });
  return scores;
}

// ── Render scoreboard ──
function renderScoreboard() {
  const scores = computeScores();
  const sorted = COUNTRIES.slice().sort((a, b) => scores[b].total - scores[a].total);
  const maxAbs = Math.max(...Object.values(scores).map(s => Math.max(s.pos, s.neg)), 1);
  const el = document.getElementById('scoreboard');

  el.innerHTML = sorted.map((c, i) => {
    const s = scores[c];
    const sign = s.total > 0 ? '+' : '';
    const cls = s.total > 0 ? 'positive' : s.total < 0 ? 'negative' : 'zero';
    const posW = (s.pos / maxAbs) * 50;
    const negW = (s.neg / maxAbs) * 50;
    return `<div class="country-card${activeCountry === c ? ' active' : ''}" data-country="${c}" style="animation-delay:${i * 40}ms">
      <div class="name">${c}</div>
      <div class="score ${cls}">${sign}${s.total}</div>
      <div class="bar-track">
        <div class="bar-fill positive" style="width:${posW}%"></div>
        <div class="bar-fill negative" style="width:${negW}%"></div>
      </div>
      <div class="breakdown">${s.pos > 0 ? '+' + s.pos + ' fav' : ''} ${s.neg > 0 ? '\u2212' + s.neg + ' adv' : ''}</div>
    </div>`;
  }).join('');

  el.querySelectorAll('.country-card').forEach(card => {
    card.addEventListener('click', () => {
      const c = card.dataset.country;
      activeCountry = activeCountry === c ? null : c;
      renderScoreboard();
      renderActions();
    });
  });
}

// ── Render filters ──
function renderFilters() {
  const cats = [...new Set(ACTIONS.map(a => a.category))];
  const el = document.getElementById('filters');
  el.innerHTML = `<div class="section-label" style="margin-bottom:0;">Category</div>` +
    cats.map(c => `<button class="filter-btn${activeCategory === c ? ' active' : ''}" data-cat="${c}">${c}</button>`).join('') +
    `<button class="filter-clear" id="clear-filters">Clear filters</button>`;

  el.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const c = btn.dataset.cat;
      activeCategory = activeCategory === c ? null : c;
      renderFilters();
      renderActions();
    });
  });

  document.getElementById('clear-filters').addEventListener('click', () => {
    activeCategory = null;
    activeCountry = null;
    renderFilters();
    renderScoreboard();
    renderActions();
  });
}

// ── Render actions ──
function renderActions() {
  let filtered = ACTIONS;
  if (activeCategory) filtered = filtered.filter(a => a.category === activeCategory);

  document.getElementById('action-count').textContent =
    `Showing ${filtered.length} of ${ACTIONS.length} actions` +
    (activeCountry ? ` \u00b7 highlighting ${activeCountry}` : '') +
    (activeCategory ? ` \u00b7 ${activeCategory}` : '');

  const el = document.getElementById('action-list');
  el.innerHTML = filtered.map((a, i) => {
    const dots = COUNTRIES.map(c => {
      const v = a.impacts[c];
      const highlighted = activeCountry === c ? ' highlighted' : '';
      return `<div class="impact-dot ${DOT_CLASS[v] || 'dot-n'}${highlighted}" title="${c}: ${v}"><div class="tooltip">${c}: ${v}</div></div>`;
    }).join('');

    const catCls = CAT_CLASS[a.category] || '';

    const impactGrid = COUNTRIES.map(c => {
      const v = a.impacts[c];
      return `<div class="impact-cell">
        <span class="country-label">${c}</span>
        <span class="impact-label ${IMPACT_CLASS(v)}">${v.replace('Strongly ', 'S.')}</span>
      </div>`;
    }).join('');

    return `<div class="action-item" style="animation-delay:${i * 30}ms">
      <div class="action-header" data-id="${a.id}">
        <div class="action-left">
          <div class="action-title">${a.title}</div>
          <div class="action-meta">
            <span class="category-badge ${catCls}">${a.category}</span>
            <span class="action-date">${a.date}</span>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <div class="impact-dots">${dots}</div>
          <span class="expand-icon">\u25B8</span>
        </div>
      </div>
      <div class="action-detail">
        <div class="action-detail-inner">
          <div class="impact-grid">${impactGrid}</div>
          <div class="action-argument">${a.argument}</div>
          <div class="action-source">Source: <span>${a.source}</span></div>
        </div>
      </div>
    </div>`;
  }).join('');

  el.querySelectorAll('.action-header').forEach(header => {
    header.addEventListener('click', () => {
      header.parentElement.classList.toggle('expanded');
    });
  });
}

// ── Init ──
renderScoreboard();
renderFilters();
renderActions();
</script>

</body>
</html>
